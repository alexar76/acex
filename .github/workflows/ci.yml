name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install Foundry libraries
        working-directory: contracts/evm
        run: |
          forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts --no-git

      - name: Forge test
        working-directory: contracts/evm
        run: forge test -vv

      - name: Forge coverage badge
        run: |
          cd contracts/evm
          forge coverage --report summary | tee /tmp/forge-cov.txt
          pct="$(awk -F'|' '/\| Total/ {gsub(/[^0-9.]/,"",$4); print int($4+0)}' /tmp/forge-cov.txt | head -1)"
          pct="${pct:-0}"
          python3 "$GITHUB_WORKSPACE/scripts/generate_static_badge.py" coverage "${pct}%" "$GITHUB_WORKSPACE/docs/badges/coverage.svg"
          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            cd "$GITHUB_WORKSPACE"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/badges/coverage.svg
            git diff --cached --quiet || { git commit -m "chore(ci): refresh coverage badge [skip ci]"; git push; }
          fi
